name: Update Pokopia Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run data update script
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node scripts/update-pokopia-data.mjs --force

      - name: Check for changes
        id: changes
        run: |
          git add content/ public/images/habitats/ public/images/cooking/ public/images/crafting/ public/images/materials/ public/images/items/ 2>/dev/null || true
          if git diff --cached --quiet && git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git reset HEAD -- . > /dev/null 2>&1
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and deploy
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="auto-update/pokopia-data-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add content/ public/images/habitats/ public/images/cooking/recipes/ public/images/cooking/tools/ public/images/crafting/ public/images/materials/ public/images/items/
          git commit -m "chore: auto-update pokopia data"
          git checkout main
          git merge "$BRANCH" --no-ff -m "chore: auto-update pokopia data"
          git push origin main
          git branch -d "$BRANCH"
